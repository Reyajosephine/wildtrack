<!DOCTYPE html>
<html>
<head>
  <title>WildTrack Assistant</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    .bot-container {
      width: min(900px, 95vw);
      height: 88vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #d4e6d8;
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.08);
    }

    .row {
      display: flex;
      gap: 10px;
    }

    #msg {
      flex: 1;
      padding: 12px;
      border: 1px solid #b7d2bf;
      border-radius: 8px;
      font-size: 16px;
    }

    #sendBtn {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #1b4332;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    h2 {
      margin: 0;
      color: #1b4332;
    }

    .bubble {
      margin: 10px 0;
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.4;
      max-width: 85%;
    }

    .user {
      background: #d8f3dc;
      margin-left: auto;
    }

    .bot {
      background: #edf2f4;
      margin-right: auto;
    }
  </style>
</head>

<body>

  <div class="bot-container">
    <h2>🤖 WildTrack Wildlife Assistant</h2>
    <div id="chatBox" class="chat-box"></div>
    <div class="row">
      <input id="msg" type="text" placeholder="Ask about animals, safety, zones, or facilities..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:8000";
    const chatBox = document.getElementById("chatBox");
    const msgInput = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");

    function addBubble(text, type) {
      const div = document.createElement("div");
      div.className = `bubble ${type}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = msgInput.value.trim();
      if (!message) return;

      addBubble(message, "user");
      msgInput.value = "";
      sendBtn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        addBubble(data.reply || "No response from assistant.", "bot");
      } catch (err) {
        addBubble("Chat service is currently unavailable. Please try again.", "bot");
        console.error("Chat error:", err);
      } finally {
        sendBtn.disabled = false;
        msgInput.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    msgInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    addBubble("Hi! I can help with wildlife park information and safety guidance.", "bot");
  </script>

</body>
</html>
