name: Trigger auto deployment for wildtrack

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/wildtrack-AutoDeployTrigger-242a5995-7169-4007-8dc7-c3261e9da017.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.WILDTRACK_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.WILDTRACK_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.WILDTRACK_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}Dockerfile
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: wildtrackacr.azurecr.io
          registryUsername: ${{ secrets.WILDTRACK_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.WILDTRACK_REGISTRY_PASSWORD }}
          containerAppName: wildtrack
          resourceGroup: wildtrack-rg
          imageToBuild: wildtrackacr.azurecr.io/wildtrack:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


